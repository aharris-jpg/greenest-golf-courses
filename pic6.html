<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6ef;
    height:100vh;
    font-family:system-ui;
  }

  .image-card {
    max-width:900px;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #e5e7eb;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    background:#fff;
  }

  .image-card img {
    width:100%;
    display:block;
  }

  .caption {
    padding:12px 14px;
    font-size:13px;
    line-height:1.4;
    color:#374151;
    font-weight:600;
  }

  .caption b {
    color:#0b1220;
    font-weight:900;
  }
</style>
</head>

<body>

<div class="image-card">
  <img src="https://www.golfdigest.com/content/dam/images/golfdigest/fullset/2017/05/25/5926d9ef332eb677d31347b4_Trump%20National%20Bedminster%20Old%2018.jpeg" alt="Trump Bedminster">

  <div class="caption">
    <b>Trump National Bedminster, New Jersey</b> — Ranked among the top tier with a 98.02 Green Score, reflecting near-perfect turf conditions.
  </div>
</div>

</body>
</html>
