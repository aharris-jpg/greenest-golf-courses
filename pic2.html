<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6ef;
    height:100vh;
    font-family:system-ui;
  }

  .image-card {
    max-width:900px;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #e5e7eb;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    background:#fff;
  }

  .image-card img {
    width:100%;
    display:block;
  }

  .caption {
    padding:12px 14px;
    font-size:13px;
    line-height:1.4;
    color:#374151;
    font-weight:600;
  }

  .caption b {
    color:#0b1220;
    font-weight:900;
  }
</style>
</head>

<body>

<div class="image-card">
  <img src="https://golfdigest.sports.sndimg.com/content/dam/images/golfdigest/fullset/course-photos-for-places-to-play/Atlanta-Athletic-Club-Riverside-4-Georgia-2437.jpg.rend.hgtvcom.966.644.suffix/1688142322396.jpeg" alt="Atlanta Athletic Club">

  <div class="caption">
    <b>Atlanta Athletic Club, Georgia</b> — Ranked #2 with a 98.02 Green Score, matching near-perfect turf conditions.
  </div>
</div>

</body>
</html>
