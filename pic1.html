<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6ef;
    height:100vh;
    font-family:system-ui;
  }

  .image-card {
    max-width:900px;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #e5e7eb;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    background:#fff;
  }

  .image-card img {
    width:100%;
    display:block;
  }

  .caption {
    padding:12px 14px;
    font-size:13px;
    line-height:1.4;
    color:#374151;
    font-weight:600;
  }

  .caption b {
    color:#0b1220;
    font-weight:900;
  }
</style>
</head>

<body>

<div class="image-card">
  <img src="https://golf-pass.brightspotcdn.com/dims4/default/ac8c721/2147483647/strip/true/crop/1004x648+218+0/resize/930x600!/format/webp/quality/90/?url=https%3A%2F%2Fgolf-pass-brightspot.s3.amazonaws.com%2F8f%2F77%2Fa55f8ae748138f56da429477e96f%2F69213.jpg" alt="Firestone Golf Course">

  <div class="caption">
    <b>Firestone (South), Ohio</b> — Ranked #1 with a perfect 100.00 Green Score, the closest match to “perfect green” in the U.S.
  </div>
</div>

</body>
</html>
