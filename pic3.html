<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6ef;
    height:100vh;
    font-family:system-ui;
  }

  .image-card {
    max-width:900px;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #e5e7eb;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    background:#fff;
  }

  .image-card img {
    width:100%;
    display:block;
  }

  .caption {
    padding:12px 14px;
    font-size:13px;
    line-height:1.4;
    color:#374151;
    font-weight:600;
  }

  .caption b {
    color:#0b1220;
    font-weight:900;
  }
</style>
</head>

<body>

<div class="image-card">
  <img src="https://golf-pass.brightspotcdn.com/dims4/default/ebfda84/2147483647/strip/true/crop/1440x810+0+73/resize/590x332!/quality/90/?url=https%3A%2F%2Fgolf-pass-brightspot.s3.amazonaws.com%2F32%2Fbc%2F39402d095b6f8342e0e237ad17fa%2F43935.jpg" alt="Camargo Club">

  <div class="caption">
    <b>Camargo Club, Ohio</b> — Ranked #3 with a 98.02 Green Score, placing it among the most pristine courses in the U.S.
  </div>
</div>

</body>
</html>
