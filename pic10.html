<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6ef;
    height:100vh;
    font-family:system-ui;
  }

  .image-card {
    max-width:900px;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #e5e7eb;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    background:#fff;
  }

  .image-card img {
    width:100%;
    display:block;
  }

  .caption {
    padding:12px 14px;
    font-size:13px;
    line-height:1.4;
    color:#374151;
    font-weight:600;
  }

  .caption b {
    color:#0b1220;
    font-weight:900;
  }
</style>
</head>

<body>

<div class="image-card">
  <img src="https://images.ctfassets.net/56u5qdsjym8c/6TpOTdD26ienjvevLIw9QV/88f9a6510c6a8ac615298eb891c6dfda/congressional-hero.png?fl=progressive&q=80" alt="Congressional Country Club">

  <div class="caption">
    <b>Congressional Country Club, Maryland</b> — Ranked among the greenest courses with a 96.57 Green Score, showcasing elite turf quality across its championship layout.
  </div>
</div>

</body>
</html>
