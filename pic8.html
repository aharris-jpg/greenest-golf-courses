<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6ef;
    height:100vh;
    font-family:system-ui;
  }

  .image-card {
    max-width:900px;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #e5e7eb;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    background:#fff;
  }

  .image-card img {
    width:100%;
    display:block;
  }

  .caption {
    padding:12px 14px;
    font-size:13px;
    line-height:1.4;
    color:#374151;
    font-weight:600;
  }

  .caption b {
    color:#0b1220;
    font-weight:900;
  }
</style>
</head>

<body>

<div class="image-card">
  <img src="https://eastlakegolfclub.com/wp-content/uploads/2023/01/Image_20230130_124741_673.jpeg" alt="East Lake Golf Club">

  <div class="caption">
    <b>East Lake Golf Club, Georgia</b> — Ranked among the greenest courses with a 97.20 Green Score, combining pristine turf with historic championship pedigree.
  </div>
</div>

</body>
</html>
